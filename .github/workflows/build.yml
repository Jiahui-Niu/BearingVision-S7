name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      # 下载 log4net 和 HslCommunication，放到固定临时目录
      # 路径: $env:RUNNER_TEMP\CILibs（各步骤直接引用，不依赖 GITHUB_ENV）
      - name: Download dependencies via NuGet
        shell: pwsh
        run: |
          $libPath = "$env:RUNNER_TEMP\CILibs"
          New-Item -ItemType Directory -Force $libPath | Out-Null

          nuget install log4net -Version 2.0.15 -OutputDirectory "$env:RUNNER_TEMP\nuget" -NonInteractive
          $log4net = Get-ChildItem "$env:RUNNER_TEMP\nuget\log4net*\lib\net45-full\log4net.dll",
                                   "$env:RUNNER_TEMP\nuget\log4net*\lib\net45\log4net.dll" `
                     -ErrorAction SilentlyContinue | Select-Object -First 1
          Copy-Item $log4net.FullName "$libPath\log4Net.dll"
          Write-Host "log4net: $($log4net.FullName)"

          # HslCommunication：CI 使用 VMSdkStubs 中的桩类型，不再从 NuGet 下载

          # System.ValueTuple — .NET 4.6.1 不内置此类型，LoginWindow.cs 的元组语法需要它
          nuget install System.ValueTuple -Version 4.5.0 -OutputDirectory "$env:RUNNER_TEMP\nuget" -NonInteractive
          $vt = Get-ChildItem "$env:RUNNER_TEMP\nuget\System.ValueTuple*\lib\net461\System.ValueTuple.dll" `
                -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $vt) {
            $vt = Get-ChildItem "$env:RUNNER_TEMP\nuget\System.ValueTuple*\" `
                  -Filter "System.ValueTuple.dll" -Recurse -ErrorAction SilentlyContinue |
                  Select-Object -First 1
          }
          if (-not $vt) { throw "System.ValueTuple.dll 未找到" }
          Copy-Item $vt.FullName "$libPath\System.ValueTuple.dll"
          Write-Host "System.ValueTuple: $($vt.FullName)"
          Write-Host "依赖已下载至: $libPath"

      # ICPlatformTools 引用了 80+ 个未使用的 VM SDK DLL（无 HintPath，需从 GAC 找）
      # CI 环境没有安装 VM，用脚本将这些引用从 csproj 中临时移除；
      # 同时将 log4Net 的 HintPath 替换为 NuGet 下载路径
      - name: Patch ICPlatformTools.csproj for CI
        shell: pwsh
        run: |
          $libPath = "$env:RUNNER_TEMP\CILibs"
          $csproj = "ICPlatformTools\ICPlatformTools.csproj"
          [xml]$xml = Get-Content $csproj -Encoding UTF8
          $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
          $ns.AddNamespace("ms", "http://schemas.microsoft.com/developer/msbuild/2003")

          $keep = @("System","Microsoft","PresentationCore","PresentationFramework",
                    "WindowsBase","WindowsFormsIntegration","AForge","FluentFTP",
                    "NAudio","Renci","Newtonsoft","OpenHardwareMonitorLib","log4net")

          $refs = $xml.SelectNodes("//ms:Reference[not(ms:HintPath)]", $ns)
          $removed = 0
          foreach ($ref in @($refs)) {
            $name = $ref.GetAttribute("Include").Split(',')[0].Trim()
            $isStd = $false
            foreach ($p in $keep) {
              if ($name.StartsWith($p, [System.StringComparison]::OrdinalIgnoreCase)) {
                $isStd = $true; break
              }
            }
            if (-not $isStd) {
              $ref.ParentNode.RemoveChild($ref) | Out-Null
              $removed++
            }
          }
          Write-Host "已移除 $removed 个 VM SDK 引用"

          foreach ($ref in @($xml.SelectNodes("//ms:Reference", $ns))) {
            $name = $ref.GetAttribute("Include").Split(',')[0].Trim()
            if ($name -ieq "log4Net") {
              $hp = $ref.SelectSingleNode("ms:HintPath", $ns)
              if ($hp) {
                $hp.InnerText = "$libPath\log4Net.dll"
                Write-Host "已替换 log4Net HintPath → $libPath\log4Net.dll"
              }
            }
          }

          $xml.Save((Resolve-Path $csproj).Path)

          # ── WpfApp1.csproj：用字符串替换注入空 Target 覆盖 ───────────
          # XML DOM 追加会带 namespace 前缀导致 MSBuild 忽略，改用文本替换。
          # Replace 会替换所有 </Project>（包括 <ProjectReference> 里的 <Project>GUID</Project>）
          # 改用 LastIndexOf 只替换文件最末尾那一个根关闭标签
          $wpfCsproj = Resolve-Path "WpfApp1\WpfApp1.csproj"
          $src = [IO.File]::ReadAllText($wpfCsproj, [Text.Encoding]::UTF8)
          # 注入 System.ValueTuple 引用（.NET 4.6.1 元组语法需要）
          # 覆盖全部 XAML 编译目标：Pass1 产生 mc.exe 调用（MC1000 的根源），一并禁用
          # XamlGeneratedStubs.ci.cs 提供 InitializeComponent/x:Name 字段替代 .g.cs
          $inject = "  <ItemGroup><Reference Include=""System.ValueTuple""><HintPath>$libPath\System.ValueTuple.dll</HintPath><Private>True</Private></Reference></ItemGroup>`r`n" +
                    "  <Target Name=""MarkupCompilePass1"" />`r`n" +
                    "  <Target Name=""MarkupCompilePass2"" />`r`n" +
                    "  <Target Name=""_MarkupCompilePass2ForMainAssembly"" />`r`n" +
                    "  <Target Name=""GenerateTemporaryTargetAssembly"" />`r`n"
          $idx = $src.LastIndexOf("</Project>")
          $src = $src.Substring(0, $idx) + $inject + "</Project>"
          [IO.File]::WriteAllText($wpfCsproj, $src, [Text.Encoding]::UTF8)
          Write-Host "=== WpfApp1.csproj 末尾验证 ==="
          Get-Content $wpfCsproj | Select-Object -Last 12 | ForEach-Object { Write-Host $_ }

      # 启用 .NET Framework 3.5（AForge 等旧库依赖 System.Core 3.5，
      # WPF XAML 编译器加载推导依赖时需要它；Windows Server 2022 默认未启用）
      - name: Enable .NET Framework 3.5
        shell: pwsh
        run: |
          dism.exe /online /enable-feature /featurename:NetFx3 /All /NoRestart
          Write-Host ".NET Framework 3.5 已启用"

      # 安装 .NET Framework 4.6.1 Targeting Pack（windows-latest 默认不含）
      - name: Install .NET Framework 4.6.1 Developer Pack
        run: choco install netfx-4.6.1-devpack --yes --no-progress

      # 用 vswhere 定位 64 位 MSBuild，避免 32 位编译器触发 WPF MC1000 错误
      - name: Build VMSdkStubs
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -requires Microsoft.Component.MSBuild `
                       -find "MSBuild\**\Bin\amd64\MSBuild.exe" | Select-Object -First 1
          Write-Host "Using MSBuild: $msbuild"
          & $msbuild VMSdkStubs\VMSdkStubs.csproj /p:Configuration=Debug /nologo /verbosity:minimal

      # BuildingForCI=true  → 使用 VMSdkStubs 替代真实 VM SDK
      # CILibPath           → log4net / HslCommunication 所在目录
      # 显式使用 64 位 MSBuild 以避免 WPF XAML 编译器 MC1000 错误
      - name: Build Solution
        shell: pwsh
        run: |
          $libPath = "$env:RUNNER_TEMP\CILibs"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -requires Microsoft.Component.MSBuild `
                       -find "MSBuild\**\Bin\amd64\MSBuild.exe" | Select-Object -First 1
          Write-Host "Using MSBuild: $msbuild"
          & $msbuild "BearingVision-S7.sln" `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /p:BuildingForCI=true `
            "/p:CILibPath=$libPath" `
            /m /nologo /verbosity:minimal

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: WpfSurface-Debug
          path: WpfApp1\bin\x64\Debug\WpfSurface.exe
          if-no-files-found: warn
